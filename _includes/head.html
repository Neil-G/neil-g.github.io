<head>

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ site.description }}">

    <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>

    <link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">

    <!-- Pygments Github CSS -->
    <link rel="stylesheet" href="{{ "/css/syntax.css" | prepend: site.baseurl }}">

    <!-- Semantic UI -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.2.13/semantic.min.css" />

    <!-- custom CSS -->
    <link rel="stylesheet" href="{{ "/css/index.css" | prepend: site.baseurl }}" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.css" />

    <script>
      function gracefulNavigation( wrapperEl, pathname) {
        pathname = pathname || '/'
        if (wrapperEl) {
            var wrappingContainer = document.getElementById(wrapperEl)
        } else {
            var wrappingContainer = document.getElementById('transition-wrapper')
        }
        wrappingContainer.style.opacity = 0;
        setTimeout(function(){
            window.location.assign(pathname)
        }, 400)
      }


    </script>

</head>
